{% for field in form %}
    <div class="form-group {% if field.errors %}has-error{% endif %}">
        <label class="control-label col-xs-4" for="id_{{ field.html_name }}">{{ field.label }} {% if field.field.required %} <span class="required">*</span>{% endif %}</label>
        <div class="col-xs-8">
            {{ field }}
        </div>
        <div class="clearfix"></div>
    </div>
{% endfor %}
