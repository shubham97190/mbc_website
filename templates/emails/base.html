{% load static %}
<html>
    <head>
        <title>Milton Masters Badminton</title>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400" rel="stylesheet">
        <style type="text/css">
            body, div.outer{
                margin: 0;
                padding: 0;
                font-family: 'Open Sans', sans-serif;
                background-color: #f5f5f5;
                font-size: 14px;
            }
            div, span, p {
                font-family: 'Open Sans', sans-serif;
                font-size: 14px;
            }
            img {
                margin: 0;
                padding: 0;
                display: block;
            }
            a {
                color: #516A86;
            }
            .social img {
                display: inline;
            }
            .icon-tick {
                color: green;
                font-size:20px;
            }
            .icon-cross{
                color: red;
                font-size:25px;
            }
        </style>
    </head>
    <body>
        <table border="0" cellpadding="0" cellspacing="0" bgcolor="#f5f5f5" width="100%">
            <tr>
                <td colspan="3" height="30px"></td>
            </tr>
            <tr>
                <td></td>
                <td valign="top" align="center">
                    <table style="width: 600px; text-align: center;" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                            <td style="background: #516A86; text-align:left;">
                                <div style="display: flex;">
                                    <img src="cid:logo"/>
                                    <span style="font-size:x-large; color: white; margin-top: 85px;">Milton Masters Badminton</span>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td style="background: #fff; {% if not no_padding %}padding: 40px 50px;{% endif %} color: #636363; text-align: left; font-size: 14px;">
                                {% block content %}{% endblock %}
                            </td>
                        </tr>
                        <tr>
                            <td style="background: #516A86; color: white;">
                                <p style="margin: 0;font-size: 14px; line-height: 35px; text-align: center">&copy; {% now "Y" %}
                                    <a href="https://miltonmastersbadminton.ca" style="color: white;">miltonmastersbadminton.ca</a> All Rights Reserved</p>
                            </td>
                        </tr>
                    </table>
                </td>
                <td></td>
            </tr>
            <tr>
                <td colspan="3" height="100px"></td>
            </tr>
        </table>
    </body>
</html>
